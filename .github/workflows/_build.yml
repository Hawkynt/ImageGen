name: Build artifacts

# Shared build/pack block. Called by release.yml (manual dispatch) and
# nightly.yml (auto, on CI success). Packs the CLI into an npm tarball so
# release and nightly never diverge.
on:
  workflow_call:
    inputs:
      ref:
        description: Git ref/SHA to build (defaults to caller ref)
        type: string
        required: false
        default: ""

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install, build, pack
        run: |
          npm install --no-audit --no-fund
          npm run build
          mkdir -p dist-pack
          npm pack --pack-destination dist-pack
          ls -la dist-pack
      - uses: actions/upload-artifact@v4
        with:
          name: app-artifacts
          path: dist-pack/*.tgz
          if-no-files-found: error
